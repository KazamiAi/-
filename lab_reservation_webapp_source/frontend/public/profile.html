<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验室预约系统 - 个人信息</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>实验室预约系统</h1>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">首页</a></li>
                <li><a href="reservations.html">我的预约</a></li>
                <li><a href="create-reservation.html">创建预约</a></li>
                <li id="labs-menu"><a href="laboratories.html">实验室管理</a></li>
                <li id="devices-menu"><a href="devices.html">设备管理</a></li>
                <li id="all-reservations-menu"><a href="all-reservations.html">预约审批</a></li>
                <li id="reports-menu"><a href="reports.html">统计报表</a></li>
                <li><a href="profile.html" class="active">个人信息</a></li>
            </ul>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="header">
                <h2>个人信息</h2>
                <div class="user-info">
                    <span id="user-name">--</span>
                    <span id="user-role">--</span>
                    <button id="logout-btn" class="logout-btn">退出登录</button>
                </div>
            </header>

            <!-- 个人信息卡 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">基本信息</h3>
                    <button id="edit-profile-btn" class="btn btn-primary">编辑信息</button>
                </div>
                <div class="card-body">
                    <div class="profile-info">
                        <div class="info-item">
                            <strong>用户名:</strong> <span id="profile-username">--</span>
                        </div>
                        <div class="info-item">
                            <strong>角色:</strong> <span id="profile-role">--</span>
                        </div>
                        <div class="info-item">
                            <strong>姓名:</strong> <span id="profile-name">--</span>
                        </div>
                        <div class="info-item">
                            <strong>邮箱:</strong> <span id="profile-email">--</span>
                        </div>
                        <div class="info-item">
                            <strong>电话:</strong> <span id="profile-phone">--</span>
                        </div>
                        <div class="info-item">
                            <strong>部门:</strong> <span id="profile-department">--</span>
                        </div>
                        <div class="info-item">
                            <strong>创建时间:</strong> <span id="profile-created-at">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 修改密码 -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <h3 class="card-title">修改密码</h3>
                </div>
                <div class="card-body">
                    <form id="change-password-form">
                        <div class="form-group">
                            <label for="current-password">当前密码</label>
                            <input type="password" id="current-password" name="currentPassword" required autocomplete="current-password">
                        </div>
                        <div class="form-group">
                            <label for="new-password">新密码</label>
                            <input type="password" id="new-password" name="newPassword" required autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">确认新密码</label>
                            <input type="password" id="confirm-password" name="confirmPassword" required autocomplete="new-password">
                        </div>
                        <div id="password-error" class="error-message"></div>
                        <button type="submit" class="btn btn-primary">修改密码</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑个人信息模态框 -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h4>编辑个人信息</h4>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="edit-profile-form">
                    <div class="form-group">
                        <label for="edit-name">姓名</label>
                        <input type="text" id="edit-name" name="name" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="edit-email">邮箱</label>
                        <input type="email" id="edit-email" name="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="edit-phone">电话</label>
                        <input type="tel" id="edit-phone" name="phone" required autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="edit-department">部门</label>
                        <input type="text" id="edit-department" name="department" required autocomplete="organization">
                    </div>
                    <div id="profile-edit-error" class="error-message"></div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary close-modal-btn">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/utils/api.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
